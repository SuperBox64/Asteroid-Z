# Native AsteroidZ releases - no wasm, no webview, Embedded Swift + SDL3.
# macOS: signed (+notarized when secrets exist). Linux: bin + deb.
# Windows and Android: experimental lanes, artifacts unsigned unless
# certificate secrets are configured.
name: native-release
on:
  workflow_dispatch:
  push:
    tags: ['native-v*']

jobs:
  macos:
    runs-on: macos-15
    env:
      HAVE_CERT: ${{ secrets.MACOS_CERT_P12_BASE64 != '' }}
      HAVE_NOTARY: ${{ secrets.NOTARY_KEY_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: SuperBox64/SuperBox64Kit
          ref: embedded
          path: SuperBox64Kit-src
      - name: place framework as sibling
        run: |
          mkdir -p "$RUNNER_TEMP/sib"
          mv SuperBox64Kit-src "$RUNNER_TEMP/sib/SuperBox64Kit"
          ln -s "$RUNNER_TEMP/sib/SuperBox64Kit" ../SuperBox64Kit
      - name: toolchain
        run: |
          curl -sL https://download.swift.org/swift-6.3.2-release/xcode/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE-osx.pkg -o /tmp/swift.pkg
          sudo installer -pkg /tmp/swift.pkg -target /
          brew install sdl3
      - name: import Developer ID certificate
        if: env.HAVE_CERT == 'true'
        run: |
          echo "${{ secrets.MACOS_CERT_P12_BASE64 }}" | base64 -d > /tmp/cert.p12
          security create-keychain -p ci ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p ci ci.keychain
          security set-keychain-settings -lut 21600 ci.keychain
          security import /tmp/cert.p12 -k ci.keychain -P "${{ secrets.MACOS_CERT_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci ci.keychain
          rm /tmp/cert.p12
      - name: build, bundle, SIGN
        if: env.HAVE_CERT == 'true'
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          export SIGN_ID="$IDENTITY"
          ./../SuperBox64Kit/native/build-sdl3-static.sh 2>/dev/null || ../SuperBox64Kit/native/build-sdl3-static.sh
          native-direct/release/build-macos.sh
      - name: build unsigned (no cert secrets configured)
        if: env.HAVE_CERT != 'true'
        env:
          SIGN_ID: '-'
        run: |
          ../SuperBox64Kit/native/build-sdl3-static.sh
          native-direct/release/build-macos.sh
      - name: NOTARIZE + staple
        if: env.HAVE_CERT == 'true' && env.HAVE_NOTARY == 'true'
        run: |
          echo "${{ secrets.NOTARY_KEY_P8_BASE64 }}" | base64 -d > /tmp/notary.p8
          xcrun notarytool submit native-direct/release/out/AsteroidZ-macos.zip \
            --key /tmp/notary.p8 --key-id "${{ secrets.NOTARY_KEY_ID }}" \
            --issuer "${{ secrets.NOTARY_ISSUER_ID }}" --wait
          xcrun stapler staple native-direct/release/out/AsteroidZ.app
          rm -f /tmp/notary.p8 native-direct/release/out/AsteroidZ-macos.zip
          ditto -c -k --keepParent native-direct/release/out/AsteroidZ.app native-direct/release/out/AsteroidZ-macos.zip
          spctl --assess --type execute native-direct/release/out/AsteroidZ.app && echo "GATEKEEPER PASS"
      - uses: actions/upload-artifact@v4
        with:
          name: AsteroidZ-macos
          path: native-direct/release/out/AsteroidZ-macos.zip

  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: SuperBox64/SuperBox64Kit
          ref: embedded
          path: ../SuperBox64Kit
      - name: toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y clang cmake ninja-build \
            libx11-dev libxext-dev libwayland-dev libxkbcommon-dev libegl-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev
          curl -sL https://swiftlang.github.io/swiftly/swiftly-install.sh | bash -s -- -y
          ~/.local/share/swiftly/bin/swiftly install 6.3.2
          echo "$HOME/.local/share/swiftly/bin" >> $GITHUB_PATH
      - name: build bin + deb
        run: FW="$(cd ../SuperBox64Kit && pwd)" native-direct/release/build-linux.sh
        working-directory: .
      - uses: actions/upload-artifact@v4
        with:
          name: AsteroidZ-linux
          path: |
            native-direct/asteroidz-direct-linux
            native-direct/*.deb

  windows:
    # EXPERIMENTAL: Embedded Swift on Windows COFF is unproven; this lane
    # documents the path and fails soft. Signing gated on WINDOWS_CERT_PFX.
    runs-on: windows-2025
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: SuperBox64/SuperBox64Kit
          ref: embedded
          path: ../SuperBox64Kit
      - uses: compnerd/gha-setup-swift@main
        with: { branch: swift-6.3.2-release, tag: 6.3.2-RELEASE }
      - name: SDL3 via vcpkg
        run: vcpkg install sdl3:x64-windows-static
      - name: build (embedded attempt, stdlib fallback)
        shell: pwsh
        run: native-direct/release/build-windows.ps1
      - name: sign
        if: ${{ secrets.WINDOWS_CERT_PFX != '' }}
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String("${{ secrets.WINDOWS_CERT_PFX }}"))
          & "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" sign /f cert.pfx /p "${{ secrets.WINDOWS_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 native-direct\asteroidz-direct.exe
      - uses: actions/upload-artifact@v4
        with: { name: AsteroidZ-windows, path: native-direct/asteroidz-direct.exe }

  android:
    # EXPERIMENTAL: SDL3's android template + Swift Android SDK produce
    # libmain.so; apk signing gated on ANDROID_KEYSTORE.
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: SuperBox64/SuperBox64Kit
          ref: embedded
          path: ../SuperBox64Kit
      - name: toolchains
        run: |
          curl -sL https://swiftlang.github.io/swiftly/swiftly-install.sh | bash -s -- -y
          ~/.local/share/swiftly/bin/swiftly install 6.3.2
          echo "$HOME/.local/share/swiftly/bin" >> $GITHUB_PATH
          swift sdk install https://github.com/swift-android-sdk/swift-android-sdk/releases/latest/download/swift-android.artifactbundle.tar.gz || true
      - name: build apk
        run: native-direct/release/build-android.sh
      - name: sign apk
        if: ${{ secrets.ANDROID_KEYSTORE != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > ks.jks
          $ANDROID_HOME/build-tools/35.0.0/apksigner sign --ks ks.jks \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            native-direct/release/out/AsteroidZ.apk
      - uses: actions/upload-artifact@v4
        with: { name: AsteroidZ-android, path: native-direct/release/out/*.apk }
